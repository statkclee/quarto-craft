meta:
  name: Quarto Craft
  link:
    home: https://github.com/

color:
  palette:
    quarto-blue-50:  "#EAF3FB"
    quarto-blue-100: "#C6DDEF"
    quarto-blue-200: "#A1C8E3"
    quarto-blue-300: "#7DB2D7"
    quarto-blue-400: "#74AADB"
    quarto-blue-500: "#5A95C9"
    quarto-blue-600: "#4080B7"
    quarto-blue-700: "#2D6BA0"
    quarto-blue-800: "#1E5688"
    quarto-blue-900: "#114571"
    neutral-50:  "#FAFAFA"
    neutral-100: "#F5F5F5"
    neutral-200: "#E5E5E5"
    neutral-300: "#D4D4D4"
    neutral-400: "#A3A3A3"
    neutral-500: "#737373"
    neutral-600: "#525252"
    neutral-700: "#404040"
    neutral-800: "#262626"
    neutral-900: "#171717"
  foreground: neutral-900
  background: "#FFFFFF"
  primary:   quarto-blue-400
  secondary: neutral-600
  tertiary:  neutral-400
  success:   "#10B981"
  info:      quarto-blue-400
  warning:   "#F59E0B"
  danger:    "#EF4444"
  light:     neutral-50
  dark:      neutral-900
  link:      quarto-blue-600

typography:
  fonts:
    - family: "Pretendard"
      source: system
    - family: "JetBrains Mono"
      source: system
    - family: "D2Coding ligature"
      source: system
    - family: "Noto Serif KR"
      source: system

  base:
    family: "Pretendard"
    size: 1rem
    line-height: 1.75
    weight: 400

  headings:
    family: "Pretendard"
    weight: 700
    line-height: 1.3
    color: quarto-blue-700

  monospace:
    family: "D2Coding ligature"
    size: 0.9em

  link:
    color: quarto-blue-600
    weight: 500
