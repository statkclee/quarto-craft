<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Pretendard Variable', Pretendard, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #171717; letter-spacing: -0.02em; }
    .subtitle { font-size: 11px; fill: #525252; font-style: italic; font-family: 'Noto Serif KR', Georgia, serif; }
    .section { font-size: 11px; font-weight: 600; fill: #262626; letter-spacing: 0.05em; text-transform: uppercase; }
    .meta { font-size: 9px; fill: #737373; font-family: 'JetBrains Mono', monospace; }
    .meta-strong { font-size: 9px; fill: #3730A3; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
    .note { font-size: 10px; fill: #525252; font-style: italic; font-family: 'Noto Serif KR', Georgia, serif; }
    .axis { stroke: #D4D4D4; stroke-width: 0.5; }
    .axis-strong { stroke: #525252; stroke-width: 0.5; }
    .sample { fill: #171717; font-weight: 400; }
    .sample-bold { fill: #171717; font-weight: 700; }
    .tick { stroke: #A3A3A3; stroke-width: 0.5; }
    .ratio { font-size: 9px; fill: #4338CA; font-family: 'JetBrains Mono', monospace; }
  </style>

  <rect width="900" height="620" fill="#FFFFFF"/>

  <text x="40" y="40" class="title">Quarto Craft · 타이포그래피</text>
  <text x="40" y="56" class="subtitle">Major Third (1.250) 타입 스케일 — 한글 가독성을 위한 비례</text>
  <line x1="40" y1="68" x2="860" y2="68" class="axis"/>

  <!-- Type Scale Visualization -->
  <text x="40" y="100" class="section">Type Scale · 1.250 ratio</text>

  <!-- Vertical baseline -->
  <line x1="430" y1="120" x2="430" y2="430" class="axis"/>

  <!-- xs -->
  <line x1="425" y1="135" x2="435" y2="135" class="tick"/>
  <text x="445" y="139" class="sample" font-size="10.24">한국어 문서에 최적화</text>
  <text x="40"  y="139" class="meta">$font-size-xs</text>
  <text x="150" y="139" class="meta">0.64rem · 10.24px</text>
  <text x="280" y="139" class="ratio">× 0.8</text>

  <!-- sm -->
  <line x1="425" y1="160" x2="435" y2="160" class="tick"/>
  <text x="445" y="165" class="sample" font-size="12.8">한국어 문서에 최적화</text>
  <text x="40"  y="165" class="meta">$font-size-sm</text>
  <text x="150" y="165" class="meta">0.80rem · 12.80px</text>
  <text x="280" y="165" class="ratio">× 1.000</text>

  <!-- base -->
  <line x1="425" y1="190" x2="435" y2="190" class="tick"/>
  <text x="445" y="196" class="sample" font-size="16">한국어 문서에 최적화</text>
  <text x="40"  y="196" class="meta-strong">$font-size-base</text>
  <text x="150" y="196" class="meta-strong">1.00rem · 16.00px ← 본문</text>
  <text x="280" y="196" class="ratio">× 1.250</text>

  <!-- md -->
  <line x1="425" y1="222" x2="435" y2="222" class="tick"/>
  <text x="445" y="228" class="sample" font-size="18">한국어 문서에 최적화</text>
  <text x="40"  y="228" class="meta">$font-size-md</text>
  <text x="150" y="228" class="meta">1.125rem · 18.00px</text>
  <text x="280" y="228" class="ratio">× 1.125</text>

  <!-- lg -->
  <line x1="425" y1="255" x2="435" y2="255" class="tick"/>
  <text x="445" y="262" class="sample" font-size="20">한국어 문서에 최적화</text>
  <text x="40"  y="262" class="meta">$font-size-lg</text>
  <text x="150" y="262" class="meta">1.250rem · 20.00px</text>
  <text x="280" y="262" class="ratio">× 1.250</text>

  <!-- xl -->
  <line x1="425" y1="291" x2="435" y2="291" class="tick"/>
  <text x="445" y="299" class="sample" font-size="25">한국어 문서에 최적화</text>
  <text x="40"  y="299" class="meta">$font-size-xl</text>
  <text x="150" y="299" class="meta">1.563rem · 25.00px</text>
  <text x="280" y="299" class="ratio">× 1.250</text>

  <!-- 2xl -->
  <line x1="425" y1="331" x2="435" y2="331" class="tick"/>
  <text x="445" y="340" class="sample-bold" font-size="31.25" letter-spacing="-0.6">한국어 문서에 최적화</text>
  <text x="40"  y="340" class="meta">$font-size-2xl</text>
  <text x="150" y="340" class="meta">1.953rem · 31.25px</text>
  <text x="280" y="340" class="ratio">× 1.250</text>

  <!-- 3xl -->
  <line x1="425" y1="375" x2="435" y2="375" class="tick"/>
  <text x="445" y="386" class="sample-bold" font-size="39" letter-spacing="-0.8">한국어 최적화</text>
  <text x="40"  y="386" class="meta">$font-size-3xl</text>
  <text x="150" y="386" class="meta">2.441rem · 39.00px</text>
  <text x="280" y="386" class="ratio">× 1.250</text>

  <!-- 4xl -->
  <line x1="425" y1="418" x2="435" y2="418" class="tick"/>
  <text x="445" y="432" class="sample-bold" font-size="48.8" letter-spacing="-1">한국어 최적화</text>
  <text x="40"  y="432" class="meta-strong">$font-size-4xl</text>
  <text x="150" y="432" class="meta-strong">3.052rem · 48.80px ← h1</text>
  <text x="280" y="432" class="ratio">× 1.250</text>

  <!-- Divider -->
  <line x1="40" y1="465" x2="860" y2="465" class="axis"/>

  <!-- Font Family Comparison -->
  <text x="40" y="490" class="section">Font Stack · 3 patterns</text>

  <g transform="translate(40, 500)">
    <text x="0"  y="20" class="meta">sans</text>
    <text x="60" y="20" font-size="14" fill="#171717">Pretendard Variable · 한글 가변 폰트 최적화</text>

    <text x="0"  y="42" class="meta">serif</text>
    <text x="60" y="42" font-size="14" fill="#171717" font-family="'Noto Serif KR', Georgia, serif">Noto Serif KR · 인용 · 강조</text>

    <text x="0"  y="64" class="meta">mono</text>
    <text x="60" y="64" font-size="13" fill="#171717" font-family="'JetBrains Mono', monospace">JetBrains Mono · code { return "한글"; }</text>
  </g>

  <line x1="40" y1="590" x2="860" y2="590" class="axis"/>
  <text x="40" y="608" class="meta">scss/quarto-theme.scss · 9 sizes · 3 families · 6 weights · 5 line-heights</text>
</svg>
