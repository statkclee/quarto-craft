<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Pretendard Variable', Pretendard, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #171717; letter-spacing: -0.02em; }
    .subtitle { font-size: 11px; fill: #525252; font-style: italic; font-family: 'Noto Serif KR', Georgia, serif; }
    .section { font-size: 11px; font-weight: 600; fill: #262626; letter-spacing: 0.05em; text-transform: uppercase; }
    .node-label { font-size: 12px; font-weight: 600; fill: #171717; }
    .node-sub { font-size: 9px; fill: #737373; font-family: 'JetBrains Mono', monospace; }
    .node-tag { font-size: 8px; fill: #4338CA; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
    .meta { font-size: 9px; fill: #525252; font-family: 'JetBrains Mono', monospace; }
    .arrow-label { font-size: 9px; fill: #4338CA; font-family: 'JetBrains Mono', monospace; }
    .note { font-size: 10px; fill: #525252; font-style: italic; font-family: 'Noto Serif KR', Georgia, serif; }
    .axis { stroke: #D4D4D4; stroke-width: 0.5; }
    .flow { stroke: #404040; stroke-width: 0.7; fill: none; }
    .flow-arrow { fill: #404040; }
    .node-box { fill: #FFFFFF; stroke: #262626; stroke-width: 0.6; }
    .node-box-accent { fill: #EEF2FF; stroke: #3730A3; stroke-width: 0.8; }
    .node-box-output { fill: #FAFAFA; stroke: #262626; stroke-width: 0.6; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="flow-arrow"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#FFFFFF"/>

  <text x="40" y="40" class="title">Quarto Craft · 렌더링 파이프라인</text>
  <text x="40" y="56" class="subtitle">한 SCSS 테마가 모든 .qmd를 거쳐 docs/templates/까지 — 단일 흐름</text>
  <line x1="40" y1="68" x2="860" y2="68" class="axis"/>

  <!-- Stage labels -->
  <text x="125" y="100" class="section" text-anchor="middle">① 입력</text>
  <text x="350" y="100" class="section" text-anchor="middle">② 테마</text>
  <text x="575" y="100" class="section" text-anchor="middle">③ 렌더</text>
  <text x="790" y="100" class="section" text-anchor="middle">④ 출력</text>

  <!-- Axis -->
  <line x1="40" y1="112" x2="860" y2="112" class="axis"/>

  <!-- ① 입력 -->
  <g transform="translate(50, 180)">
    <rect class="node-box" x="0" y="0" width="150" height="100" rx="2"/>
    <text x="75" y="22" class="node-label" text-anchor="middle">콘텐츠</text>
    <line x1="20" y1="32" x2="130" y2="32" class="axis"/>
    <text x="75" y="50" class="node-sub" text-anchor="middle">_quarto.yml</text>
    <text x="75" y="64" class="node-sub" text-anchor="middle">*.qmd × 8</text>
    <text x="75" y="78" class="node-sub" text-anchor="middle">brand/ assets</text>
    <text x="75" y="94" class="node-tag" text-anchor="middle">INPUT</text>
  </g>

  <!-- 화살표 ① → ② -->
  <path class="flow" d="M 205 230 L 270 230" marker-end="url(#arrow)"/>
  <text x="237" y="222" class="arrow-label" text-anchor="middle">theme:</text>

  <!-- ② 테마 (강조) -->
  <g transform="translate(275, 180)">
    <rect class="node-box-accent" x="0" y="0" width="150" height="100" rx="2"/>
    <text x="75" y="22" class="node-label" text-anchor="middle">quarto-theme.scss</text>
    <line x1="20" y1="32" x2="130" y2="32" stroke="#3730A3" stroke-width="0.3"/>
    <text x="75" y="50" class="node-sub" text-anchor="middle">scss:defaults</text>
    <text x="75" y="64" class="node-sub" text-anchor="middle">scss:rules</text>
    <text x="75" y="78" class="node-sub" text-anchor="middle">+ revealjs.scss</text>
    <text x="75" y="94" class="node-tag" text-anchor="middle" fill="#3730A3" font-weight="700">SINGLE SOURCE</text>
  </g>

  <!-- 화살표 ② → ③ -->
  <path class="flow" d="M 430 230 L 495 230" marker-end="url(#arrow)"/>
  <text x="462" y="222" class="arrow-label" text-anchor="middle">컴파일</text>

  <!-- ③ 렌더 -->
  <g transform="translate(500, 180)">
    <rect class="node-box" x="0" y="0" width="150" height="100" rx="2"/>
    <text x="75" y="22" class="node-label" text-anchor="middle">quarto render</text>
    <line x1="20" y1="32" x2="130" y2="32" class="axis"/>
    <text x="75" y="50" class="node-sub" text-anchor="middle">v1.10 엔진</text>
    <text x="75" y="64" class="node-sub" text-anchor="middle">SCSS 내장 컴파일</text>
    <text x="75" y="78" class="node-sub" text-anchor="middle">Pandoc · Typst</text>
    <text x="75" y="94" class="node-tag" text-anchor="middle">ENGINE</text>
  </g>

  <!-- 화살표 ③ → ④ -->
  <path class="flow" d="M 655 230 L 720 230" marker-end="url(#arrow)"/>
  <text x="687" y="222" class="arrow-label" text-anchor="middle">build</text>

  <!-- ④ 출력 -->
  <g transform="translate(725, 180)">
    <rect class="node-box-output" x="0" y="0" width="130" height="100" rx="2"/>
    <text x="65" y="22" class="node-label" text-anchor="middle">docs/templates/</text>
    <line x1="15" y1="32" x2="115" y2="32" class="axis"/>
    <text x="65" y="50" class="node-sub" text-anchor="middle">8 outputs</text>
    <text x="65" y="64" class="node-sub" text-anchor="middle">html · revealjs</text>
    <text x="65" y="78" class="node-sub" text-anchor="middle">dashboard · pdf</text>
    <text x="65" y="94" class="node-tag" text-anchor="middle">→ GitHub Pages</text>
  </g>

  <!-- 8 outputs strip -->
  <line x1="40" y1="320" x2="860" y2="320" class="axis"/>
  <text x="40" y="342" class="section">8개 출력물</text>

  <g transform="translate(40, 354)" font-family="'JetBrains Mono', monospace" font-size="9" fill="#404040">
    <text x="0"   y="14">docs/templates/</text>
    <text x="20"  y="30">├ report/          <tspan fill="#737373">html</tspan></text>
    <text x="20"  y="44">├ presentation/    <tspan fill="#737373">revealjs</tspan></text>
    <text x="20"  y="58">├ dashboard/       <tspan fill="#737373">dashboard</tspan></text>
    <text x="20"  y="72">├ confluence/      <tspan fill="#737373">html → wiki</tspan></text>

    <text x="280" y="30">├ book/            <tspan fill="#737373">html + typst</tspan></text>
    <text x="280" y="44">├ manuscript/      <tspan fill="#737373">html + typst</tspan></text>
    <text x="280" y="58">├ blog/            <tspan fill="#737373">website + listing</tspan></text>
    <text x="280" y="72">└ typst-pdf/       <tspan fill="#737373">typst pdf</tspan></text>
  </g>

  <!-- Sub-project note -->
  <line x1="40" y1="440" x2="860" y2="440" class="axis"/>
  <text x="40" y="462" class="section">Sub-project (별도 _quarto.yml)</text>
  <text x="40" y="478" class="note">book · manuscript · blog는 자체 _quarto.yml을 갖는 sub-project이므로 해당 디렉토리에서 실행.</text>
  <g transform="translate(40, 488)" font-family="'JetBrains Mono', monospace" font-size="9" fill="#404040">
    <text x="0"   y="14">$ <tspan fill="#3730A3" font-weight="700">cd templates/book      &amp;&amp; quarto render</tspan></text>
    <text x="380" y="14">$ <tspan fill="#3730A3" font-weight="700">cd templates/blog      &amp;&amp; quarto render</tspan></text>
  </g>
</svg>
