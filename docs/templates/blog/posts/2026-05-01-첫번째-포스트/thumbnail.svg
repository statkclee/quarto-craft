<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Pretendard Variable', Pretendard, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; fill: #171717; letter-spacing: -0.02em; }
    .subtitle { font-size: 11px; fill: #525252; font-style: italic; font-family: 'Noto Serif KR', Georgia, serif; }
    .section { font-size: 11px; font-weight: 600; fill: #262626; letter-spacing: 0.05em; text-transform: uppercase; }
    .label { font-size: 9px; fill: #404040; font-family: 'JetBrains Mono', monospace; }
    .value { font-size: 8px; fill: #737373; font-family: 'JetBrains Mono', monospace; }
    .note { font-size: 10px; fill: #525252; font-style: italic; font-family: 'Noto Serif KR', Georgia, serif; }
    .axis { stroke: #D4D4D4; stroke-width: 0.5; }
  </style>

  <rect width="900" height="560" fill="#FFFFFF"/>

  <text x="40" y="40" class="title">Quarto Craft · 컬러 시스템</text>
  <text x="40" y="56" class="subtitle">한국어 문서에 최적화된 Quarto Blue 기반 디자인 토큰 체계</text>
  <line x1="40" y1="68" x2="860" y2="68" class="axis"/>

  <!-- Primary Palette -->
  <text x="40" y="100" class="section">Primary · Quarto Blue</text>
  <text x="40" y="115" class="note">메인 브랜드 색상. 400은 primary, 600은 링크, 700은 헤딩 컬러로 사용.</text>

  <g transform="translate(40, 130)">
    <rect x="0"   y="0" width="78" height="48" fill="#EAF3FB"/>
    <rect x="80"  y="0" width="78" height="48" fill="#C6DDEF"/>
    <rect x="160" y="0" width="78" height="48" fill="#A1C8E3"/>
    <rect x="240" y="0" width="78" height="48" fill="#7DB2D7"/>
    <rect x="320" y="0" width="78" height="48" fill="#74AADB"/>
    <rect x="400" y="0" width="78" height="48" fill="#5A95C9"/>
    <rect x="480" y="0" width="78" height="48" fill="#4080B7"/>
    <rect x="560" y="0" width="78" height="48" fill="#2D6BA0"/>
    <rect x="640" y="0" width="78" height="48" fill="#1E5688"/>
    <rect x="720" y="0" width="78" height="48" fill="#114571"/>

    <text x="0"   y="62" class="label">50</text>
    <text x="80"  y="62" class="label">100</text>
    <text x="160" y="62" class="label">200</text>
    <text x="240" y="62" class="label">300</text>
    <text x="320" y="62" class="label">400 ←primary</text>
    <text x="400" y="62" class="label">500</text>
    <text x="480" y="62" class="label">600 ←link</text>
    <text x="560" y="62" class="label">700 ←headings</text>
    <text x="640" y="62" class="label">800</text>
    <text x="720" y="62" class="label">900</text>

    <text x="0"   y="74" class="value">EAF3FB</text>
    <text x="80"  y="74" class="value">C6DDEF</text>
    <text x="160" y="74" class="value">A1C8E3</text>
    <text x="240" y="74" class="value">7DB2D7</text>
    <text x="320" y="74" class="value">74AADB</text>
    <text x="400" y="74" class="value">5A95C9</text>
    <text x="480" y="74" class="value">4080B7</text>
    <text x="560" y="74" class="value">2D6BA0</text>
    <text x="640" y="74" class="value">1E5688</text>
    <text x="720" y="74" class="value">114571</text>
  </g>

  <!-- Neutral Palette -->
  <text x="40" y="240" class="section">Neutral · Gray</text>
  <text x="40" y="255" class="note">텍스트와 배경 위계. 900은 본문, 600은 보조, 200은 테두리.</text>

  <g transform="translate(40, 270)">
    <rect x="0"   y="0" width="78" height="36" fill="#FAFAFA" stroke="#E5E5E5" stroke-width="0.5"/>
    <rect x="80"  y="0" width="78" height="36" fill="#F5F5F5"/>
    <rect x="160" y="0" width="78" height="36" fill="#E5E5E5"/>
    <rect x="240" y="0" width="78" height="36" fill="#D4D4D4"/>
    <rect x="320" y="0" width="78" height="36" fill="#A3A3A3"/>
    <rect x="400" y="0" width="78" height="36" fill="#737373"/>
    <rect x="480" y="0" width="78" height="36" fill="#525252"/>
    <rect x="560" y="0" width="78" height="36" fill="#404040"/>
    <rect x="640" y="0" width="78" height="36" fill="#262626"/>
    <rect x="720" y="0" width="78" height="36" fill="#171717"/>

    <text x="0"   y="50" class="label">50</text>
    <text x="80"  y="50" class="label">100</text>
    <text x="160" y="50" class="label">200 ←border</text>
    <text x="240" y="50" class="label">300</text>
    <text x="320" y="50" class="label">400</text>
    <text x="400" y="50" class="label">500</text>
    <text x="480" y="50" class="label">600 ←sub</text>
    <text x="560" y="50" class="label">700</text>
    <text x="640" y="50" class="label">800</text>
    <text x="720" y="50" class="label">900 ←text</text>
  </g>

  <!-- Semantic + Callout -->
  <text x="40" y="370" class="section">Semantic · Callout</text>
  <text x="40" y="385" class="note">의미 색상. info는 brand primary와 동일한 Quarto Blue.</text>

  <g transform="translate(40, 400)">
    <!-- Semantic -->
    <rect x="0" y="0" width="80" height="48" fill="#10B981"/>
    <text x="0" y="62" class="label">success</text>
    <text x="0" y="74" class="value">10B981</text>

    <rect x="100" y="0" width="80" height="48" fill="#F59E0B"/>
    <text x="100" y="62" class="label">warning</text>
    <text x="100" y="74" class="value">F59E0B</text>

    <rect x="200" y="0" width="80" height="48" fill="#EF4444"/>
    <text x="200" y="62" class="label">error</text>
    <text x="200" y="74" class="value">EF4444</text>

    <rect x="300" y="0" width="80" height="48" fill="#74AADB"/>
    <text x="300" y="62" class="label">info</text>
    <text x="300" y="74" class="value">74AADB</text>

    <line x1="410" y1="-5" x2="410" y2="55" class="axis"/>

    <!-- Callout (uses semantic + extra orange) -->
    <rect x="430" y="0" width="80" height="48" fill="#F97316"/>
    <text x="430" y="62" class="label">caution</text>
    <text x="430" y="74" class="value">F97316</text>

    <!-- Backgrounds -->
    <line x1="530" y1="-5" x2="530" y2="55" class="axis"/>

    <rect x="550" y="0" width="60" height="48" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="0.5"/>
    <text x="550" y="62" class="label">bg</text>
    <text x="550" y="74" class="value">FFFFFF</text>

    <rect x="620" y="0" width="60" height="48" fill="#F8F9FC" stroke="#D4D4D4" stroke-width="0.5"/>
    <text x="620" y="62" class="label">code</text>
    <text x="620" y="74" class="value">F8F9FC</text>

    <rect x="690" y="0" width="60" height="48" fill="#FAFAFA" stroke="#D4D4D4" stroke-width="0.5"/>
    <text x="690" y="62" class="label">surface</text>
    <text x="690" y="74" class="value">FAFAFA</text>
  </g>

  <line x1="40" y1="510" x2="860" y2="510" class="axis"/>
  <text x="40" y="528" class="note">36 color tokens · 1 brand hue (Quarto Blue) · 4 semantic · 10-step ramps</text>
  <text x="40" y="544" class="value">출처: _brand.yml · color.palette + scss/quarto-theme.scss</text>
</svg>
