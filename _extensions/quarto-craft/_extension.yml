title: Quarto Craft
author: minjoo
version: 1.0.0
quarto-required: ">=1.4.0"

contributes:
  formats:
    html:
      theme:
        - cosmo
        - assets/quarto-craft.scss
      css: assets/quarto-craft.css
      mainfont: "Pretendard Variable"
      monofont: "JetBrains Mono"
      lang: ko
    revealjs:
      theme:
        - default
        - assets/quarto-craft.scss
      mainfont: "Pretendard Variable"
      monofont: "JetBrains Mono"
      lang: ko
