project:
  type: book
  output-dir: ../../docs/book

book:
  title: "책 제목"
  author: "저자명"
  date: today
  date-format: "YYYY년 MM월 DD일"
  sidebar:
    logo: logo-text.svg
  chapters:
    - index.qmd
    - chapter-01.qmd
    - chapter-02.qmd
  downloads: [pdf]

format:
  html:
    theme:
      - cosmo
      - ../../scss/quarto-theme.scss
    lang: ko
    favicon: ../../design-system/brand/favicon.svg
    mainfont: "Pretendard Variable"
    monofont: "JetBrains Mono"
    toc: true
    number-sections: true
  typst:
    lang: ko
    mainfont: "Pretendard"
    monofont: "JetBrains Mono"
    fontsize: 11pt
    toc: true
    number-sections: true
    margin:
      x: 2.5cm
      y: 2.5cm
