project:
  type: manuscript
  output-dir: ../../docs/templates/manuscript

brand: ../../_brand.yml

manuscript:
  article: index.qmd

format:
  html:
    theme:
      - cosmo
      - brand
      - ../../scss/quarto-theme.scss
    lang: ko
    toc: true
    number-sections: true
  typst:
    lang: ko
    monofont: "D2Coding ligature"
    toc: true
    number-sections: true
    margin:
      x: 2.5cm
      y: 2.5cm
    fontsize: 11pt
    linestretch: 1.5
    columns: 1
